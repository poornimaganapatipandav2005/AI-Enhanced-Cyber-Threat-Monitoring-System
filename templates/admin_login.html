<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Admin Login - Cyber Dashboard</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{
  min-height:100vh;background:#000;color:#e2e8f0;
  font-family:'Segoe UI',sans-serif;display:flex;align-items:center;justify-content:center;
  padding:24px;
}
body::before{
  content:'';position:fixed;inset:0;
  background-image:
    linear-gradient(rgba(0,255,255,.025) 1px,transparent 1px),
    linear-gradient(90deg,rgba(0,255,255,.025) 1px,transparent 1px);
  background-size:50px 50px;pointer-events:none;
}
.login-card{
  position:relative;width:100%;max-width:420px;
  background:rgba(15,23,42,.94);
  border:1px solid rgba(0,255,255,.18);
  border-radius:14px;padding:30px;
  box-shadow:0 20px 60px rgba(0,0,0,.55);
}
.brand{text-align:center;margin-bottom:24px;}
.brand-icon{
  width:58px;height:58px;border-radius:14px;margin:0 auto 12px;
  display:flex;align-items:center;justify-content:center;
  background:rgba(245,158,11,.12);border:1px solid rgba(245,158,11,.35);
  color:#f59e0b;font-size:24px;
}
.brand h1{font-size:24px;font-weight:800;color:#00ffff;margin-bottom:4px;}
.brand p{font-size:13px;color:#64748b;margin:0;}
.form-label{font-size:12px;color:#94a3b8;font-weight:600;}
.form-control{
  background:#020617;border:1px solid #1e3a5f;color:#e2e8f0;
  border-radius:9px;padding:11px 12px;
}
.form-control:focus{
  background:#020617;color:#e2e8f0;border-color:#00ffff;
  box-shadow:0 0 0 .2rem rgba(0,255,255,.12);
}
.btn-admin{
  width:100%;border:none;border-radius:9px;padding:11px 16px;
  background:linear-gradient(135deg,#00ffff,#0ea5e9);
  color:#000;font-weight:800;margin-top:8px;
}
.btn-admin:hover{opacity:.9;color:#000;}
.alert-cyber{
  background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.35);
  color:#fca5a5;border-radius:9px;padding:10px 12px;font-size:13px;
}
.back-link{
  display:block;text-align:center;margin-top:18px;color:#64748b;
  text-decoration:none;font-size:13px;
}
.back-link:hover{color:#00ffff;}
</style>
</head>
<body>
  <main class="login-card">
    <div class="brand">
      <div class="brand-icon"><i class="fa fa-user-shield"></i></div>
      <h1>Admin Login</h1>
      <p>Enter admin credentials to open the control panel</p>
    </div>

    {% if msg %}
    <div class="alert-cyber mb-3">{{ msg }}</div>
    {% endif %}

    <form method="POST" action="{{ url_for('admin_login') }}">
      <div class="mb-3">
        <label class="form-label" for="username">Username</label>
        <input class="form-control" id="username" name="username" type="text" autocomplete="username" required>
      </div>
      <div class="mb-3">
        <label class="form-label" for="password">Password</label>
        <input class="form-control" id="password" name="password" type="password" autocomplete="current-password" required>
      </div>
      <button class="btn-admin" type="submit">
        <i class="fa fa-right-to-bracket"></i> Login
      </button>
    </form>

    <a class="back-link" href="{{ url_for('login') }}">Back to user login</a>
  </main>
</body>
</html>
