<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Access Blocked – Cyber Dashboard</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
  body {
    background:#000; color:#e2e8f0;
    font-family:'Segoe UI',sans-serif;
    min-height:100vh; display:flex;
    align-items:center; justify-content:center;
  }
  .block-card {
    text-align:center; max-width:480px;
    background:rgba(15,23,42,.95);
    border:1px solid rgba(239,68,68,.4);
    border-radius:20px; padding:50px 40px;
    box-shadow:0 0 40px rgba(239,68,68,.2);
  }
  .block-icon { font-size:72px; display:block; margin-bottom:20px; }
  h1 { color:#ef4444; font-size:28px; margin-bottom:10px; }
  p  { color:#94a3b8; font-size:15px; margin-bottom:6px; }
  .ip-badge {
    display:inline-block; margin:16px 0;
    background:rgba(239,68,68,.15);
    border:1px solid rgba(239,68,68,.4);
    border-radius:8px; padding:8px 20px;
    color:#fca5a5; font-family:monospace; font-size:16px;
  }
  .contact-note { color:#64748b; font-size:13px; margin-top:20px; }
</style>
</head>
<body>
<div class="block-card">
  <span class="block-icon">⛔</span>
  <h1>Access Blocked</h1>
  <p>Your IP address has been blocked due to suspicious activity.</p>
  <div class="ip-badge">{{ ip }}</div>
  <p>If you believe this is a mistake, please contact the system administrator.</p>
  <p class="contact-note">This incident has been logged and reported.</p>
</div>
</body>
</html>
