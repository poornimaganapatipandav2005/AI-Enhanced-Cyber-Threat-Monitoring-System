<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Edit User – Admin</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
  body { background:#020617; color:#e2e8f0; font-family:'Segoe UI',sans-serif;
         display:flex; align-items:center; justify-content:center; min-height:100vh; }
  .card-wrap {
    width:460px; background:rgba(15,23,42,.95);
    border:1px solid rgba(0,255,255,.25); border-radius:16px;
    padding:36px; box-shadow:0 0 30px rgba(0,255,255,.1);
  }
  h2 { color:#00ffff; text-align:center; margin-bottom:24px; }
  label { font-size:13px; color:#94a3b8; display:block; margin-bottom:5px; }
  input, select {
    width:100%; padding:10px 12px;
    background:#0f172a; border:1px solid #1e3a5f;
    border-radius:8px; color:#e2e8f0; font-size:14px;
    margin-bottom:14px;
  }
  input:focus, select:focus { outline:none; border-color:#00ffff; }
  .btn-save {
    width:100%; padding:11px;
    background:linear-gradient(135deg,#00ffff,#0ea5e9);
    border:none; border-radius:8px;
    color:#020617; font-weight:700; cursor:pointer;
  }
  .btn-save:hover { opacity:.9; }
  .back { display:block; text-align:center; margin-top:14px;
          color:#38bdf8; text-decoration:none; font-size:13px; }
</style>
</head>
<body>
<div class="card-wrap">
  <h2>✏️ Edit User</h2>
  <form method="POST">
    <label>First Name</label>
    <input name="fname" value="{{ user.get('First Name','') }}" required>
    <label>Last Name</label>
    <input name="lname" value="{{ user.get('Last Name','') }}" required>
    <label>Email</label>
    <input type="email" name="email" value="{{ user.get('Email','') }}" required>
    <label>Mobile</label>
    <input name="mobile" value="{{ user.get('Mobile','') }}">
    <label>Gender</label>
    <select name="gender">
      <option value="">Select</option>
      {% for g in ['Male','Female','Other'] %}
      <option {% if user.get('Gender','') == g %}selected{% endif %}>{{ g }}</option>
      {% endfor %}
    </select>
    <button type="submit" class="btn-save">💾 Save Changes</button>
  </form>
  <a href="/admin_dashboard" class="back">← Back to Admin Dashboard</a>
</div>
</body>
</html>
